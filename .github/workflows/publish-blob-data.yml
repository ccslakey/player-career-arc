name: Publish Full Data To Vercel Blob

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: "Blob prefix (use latest for no app redeploy, or releases/<id> for immutable versions)"
        required: true
        default: "latest"
      start_year:
        description: "First season to include"
        required: true
        default: "1871"
      end_year:
        description: "Last season to include (leave blank to use current year)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  publish:
    name: Generate and upload static data
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Generate full frontend dataset
        working-directory: web
        run: |
          ARGS="scripts/sync-data.mjs --generate --all-players --start-year ${{ inputs.start_year }}"
          if [ -n "${{ inputs.end_year }}" ]; then
            ARGS="$ARGS --end-year ${{ inputs.end_year }}"
          fi
          node $ARGS

      - name: Upload data to Vercel Blob
        working-directory: web
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          if [ -z "$BLOB_READ_WRITE_TOKEN" ]; then
            echo "Missing BLOB_READ_WRITE_TOKEN secret."
            exit 1
          fi
          node scripts/upload-blob-data.mjs --prefix "${{ inputs.prefix }}"
