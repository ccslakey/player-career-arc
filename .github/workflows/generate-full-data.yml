name: Generate Full Frontend Data

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: "First season to include"
        required: true
        default: "1871"
      end_year:
        description: "Last season to include (leave blank to use the current year)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  generate:
    name: Build full static frontend dataset
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Generate full frontend data
        working-directory: web
        run: |
          ARGS="scripts/sync-data.mjs --generate --all-players --start-year ${{ inputs.start_year }}"
          if [ -n "${{ inputs.end_year }}" ]; then
            ARGS="$ARGS --end-year ${{ inputs.end_year }}"
          fi
          node $ARGS

      - name: Summarize generated data footprint
        run: |
          du -sh web/public/data
          du -sh data/processed

      - name: Upload frontend data artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-data
          path: web/public/data
          retention-days: 7

      - name: Upload processed dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed
          retention-days: 7
